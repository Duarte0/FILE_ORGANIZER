name: Build Windows EXE + Installer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout do projeto
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Inno Setup
        run: |
          choco install innosetup -y

      - name: Build EXE (PyInstaller)
        run: |
          pyinstaller --noconfirm DistribuidorArquivos.spec

      - name: Preparar release/app
        run: |
          if exist release rmdir /s /q release
          mkdir release
          mkdir release\app

          copy dist\DistribuidorArquivos.exe release\app\DistribuidorArquivos.exe
          copy config.env release\app\config.env
          copy regras.xlsx release\app\regras.xlsx

          mkdir release\app\logs
          mkdir release\app\relatorios

      - name: Gerar instalador com Inno Setup
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload do instalador
        uses: actions/upload-artifact@v4
        with:
          name: DistribuidorArquivos-Setup
          path: release/DistribuidorArquivos_Setup.exe

      - name: Upload do EXE
        uses: actions/upload-artifact@v4
        with:
          name: DistribuidorArquivos-EXE
          path: dist/DistribuidorArquivos.exe